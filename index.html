<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEP Economics</title>

<style>
/* ===== GLOBAL ===== */
body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; background: #f5f7fa; }

/* ===== SIDEBAR ===== */
.sidebar { width: 240px; background: #0f2a44; color: white; height: 100vh; position: fixed; padding-top: 20px; }
.logo { text-align: center; padding: 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
.logo span { color: #2ecc71; }
.sidebar a { display: block; padding: 12px 25px; color: white; text-decoration: none; font-size: 14px; cursor: pointer; transition: 0.2s; }
.sidebar a:hover { background: #1f3f5b; color: #2ecc71; }

/* ===== MAIN CONTENT AREA ===== */
.main { margin-left: 240px; width: 100%; min-height: 100vh; }

/* ===== NAVBAR ===== */
.navbar { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
.navbar input { padding: 8px; width: 300px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
.navbar button { background: #2ecc71; border: none; padding: 8px 15px; color: white; border-radius: 5px; cursor: pointer; }

/* ===== HERO (Dynamic) ===== */
.hero { 
    display: flex; align-items: center; padding: 60px 40px; 
    background: linear-gradient(to right, rgba(255,255,255,0.9), rgba(255,255,255,0.7)), url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1000&q=80'); 
    background-size: cover; 
}
.hero-text { max-width: 600px; }
.hero h1 { font-size: 42px; margin: 0; }
.hero h1 span { color: #2ecc71; }
.hero p { margin-top: 10px; font-size: 18px; color: #555; }

/* ===== GRID & CARDS ===== */
.section-padding { padding: 30px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
.card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 2px 8px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
.card:hover { transform: translateY(-5px); box-shadow: 0px 5px 15px rgba(0,0,0,0.1); }
.tag { color: #2ecc71; font-weight: bold; font-size: 12px; text-transform: uppercase; }

/* ===== BLOG WRITING FORM ===== */
.form-container { background: white; padding: 30px; border-radius: 10px; max-width: 700px; margin: 20px auto; }
.form-container input, .form-container textarea, .form-container select { 
    width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;
}
.btn-save { background: #2ecc71; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; }

/* ===== FOOTER ===== */
.footer { text-align: center; padding: 20px; color: #777; font-size: 14px; }
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">STEP <span>Economics</span></div>
    <a onclick="loadPage('home')">Home</a>
    <a onclick="loadPage('blog')">Blog & Insights</a>
    <a onclick="loadPage('write')">Create Content</a>
    <a href="#">NRB Exam Prep</a>
    <a href="#">Research & Data</a>
    <a href="#">About</a>
</div>

<div class="main">
    <div class="navbar">
        <input type="text" placeholder="Search insights..." onkeyup="searchPost(this.value)">
        <button>Sign In</button>
    </div>

    <div id="app"></div>

    <div class="footer">
        © 2026 STEP Economics | Built for Economists
    </div>
</div>

<script>
/* DATA STORAGE */
let posts = JSON.parse(localStorage.getItem("step_posts")) || [
    { id: 1, title: "Understanding Nepal's Fiscal Policy", category: "Macro", content: "Detailed analysis of the current budget...", date: "2026-01-15", featured: true }
];

function save() { localStorage.setItem("step_posts", JSON.stringify(posts)); }

/* ROUTER */
function loadPage(page) {
    const app = document.getElementById("app");

    if (page === 'home') {
        app.innerHTML = `
            <div class="hero">
                <div class="hero-text">
                    <h1>STEP <span>Economics</span></h1>
                    <p>Consulting | Research | Strategy</p>
                    <button class="btn-save" onclick="loadPage('blog')">View Insights</button>
                </div>
            </div>
            <div class="section-padding">
                <h2>Featured Analysis</h2>
                <div class="grid">
                    ${posts.map(p => `
                        <div class="card" onclick="openPost(${p.id})">
                            <span class="tag">${p.category}</span>
                            <h3>${p.title}</h3>
                            <p>${p.content.substring(0, 80)}...</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    if (page === 'blog') {
        app.innerHTML = `
            <div class="section-padding">
                <h2>Blog & Economic Insights</h2>
                <div class="grid">${posts.map(p => `
                    <div class="card" onclick="openPost(${p.id})">
                        <span class="tag">${p.category}</span>
                        <h3>${p.title}</h3>
                        <small>${p.date}</small>
                        <button onclick="deletePost(${p.id}); event.stopPropagation();" style="display:block; margin-top:10px; color:red; border:none; background:none; cursor:pointer;">Delete</button>
                    </div>
                `).join('')}</div>
            </div>
        `;
    }

    if (page === 'write') {
        app.innerHTML = `
            <div class="form-container">
                <h2>New Economic Insight</h2>
                <input id="title" placeholder="Post Title">
                <select id="cat">
                    <option>Macro Economics</option>
                    <option>Micro Economics</option>
                    <option>NRB Prep</option>
                </select>
                <textarea id="cont" rows="10" placeholder="Write content..."></textarea>
                <button class="btn-save" onclick="savePost()">Publish Insight</button>
            </div>
        `;
    }
}

/* FUNCTIONS */
function savePost() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("cont").value;
    const category = document.getElementById("cat").value;

    if(!title || !content) return alert("Fields cannot be empty");

    posts.unshift({ id: Date.now(), title, content, category, date: new Date().toLocaleDateString() });
    save();
    loadPage('blog');
}

function openPost(id) {
    const p = posts.find(x => x.id === id);
    document.getElementById("app").innerHTML = `
        <div class="section-padding">
            <button onclick="loadPage('blog')">← Back</button>
            <h1 style="margin-top:20px;">${p.title}</h1>
            <p><strong>Category:</strong> ${p.category} | ${p.date}</p>
            <hr>
            <div style="font-size:18px; line-height:1.6; background:white; padding:20px; border-radius:10px;">${p.content}</div>
        </div>
    `;
}

function deletePost(id) {
    posts = posts.filter(p => p.id !== id);
    save();
    loadPage('blog');
}

function searchPost(q) {
    const filtered = posts.filter(p => p.title.toLowerCase().includes(q.toLowerCase()));
    // Simple logic to show search results could go here
}

// Initialize
loadPage('home');
</script>
</body>
</html>
